name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # The git tag is the source of truth for the version. Strip the leading
      # "v" (v0.1.1 -> 0.1.1) and write it into package.json without committing.
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # No token needed: npm authenticates via OIDC and generates provenance
      # automatically. Configure the trusted publisher on npmjs.com first.
      - name: Publish to npm
        run: npm publish
